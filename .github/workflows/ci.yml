name: hds-ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify HDS holography
        run: |
          chmod +x tools/*.sh || true
          ./tools/algebra-sync.sh || true
          ./tools/spec-version-check.sh || true
          ./tools/holo-verify.sh
          ./tools/surface-lint.sh
          ./tools/docs-link-check.sh
