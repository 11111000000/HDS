name: hds-ci
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify HDS holography
        run: |
          bash tools/holo-verify.sh
          bash tools/surface-lint.sh
          bash tools/docs-link-check.sh
          bash tools/spec-version-check.sh
